# ──────────────────────────────────────────────────────────────────────────────
# Intelligent Codebase — Guard Rules
# ──────────────────────────────────────────────────────────────────────────────
# Customize what Claude can and cannot do in this project.
# The PreToolUse hook reads these rules before every action.
#
# IMPORTANT: Tier 1 (catastrophic) guards CANNOT be overridden here.
# This file controls Tier 2 (file protection) and Tier 3 (permission scoping).
# ──────────────────────────────────────────────────────────────────────────────

# Files Claude should NEVER modify (even with bypass_all)
protected_files:
  - .env
  - .env.production
  - .env.staging
  - composer.lock
  - package-lock.json

# Files that require human approval before changes
approval_required:
  - database/migrations/*
  - routes/api.php
  - routes/web.php
  - app/Http/Middleware/*
  - config/*.php

# Directories Claude cannot delete files from
no_delete_directories:
  - app/Models
  - database/migrations
  - config
  - resources/views/layouts

# Commands that are blocked (regex patterns)
blocked_commands:
  - "php artisan migrate:fresh"
  - "php artisan db:wipe"
  - "php artisan down"  # Taking app offline is a human decision

# Commands that are allowed but logged (for audit trail)
logged_commands:
  - "php artisan migrate"
  - "php artisan queue:restart"
  - "composer require *"
  - "composer remove *"
  - "git commit *"
  - "git push *"

# Custom blocked patterns (add your own)
# Format: regex patterns matched against the full command string
custom_blocks: []
  # - "kubectl delete"
  # - "terraform destroy"
  # - "aws s3 rm"
